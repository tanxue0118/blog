<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">SQLite fragmentation and VACUUM comparison</title>
  <desc id="desc">A diagram comparing fragmented SQLite pages before VACUUM and compact pages after VACUUM.</desc>
  <rect width="920" height="420" fill="#f7f9fb"/>
  <text x="42" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">SQLite 数据库碎片化示意</text>
  <text x="42" y="84" font-family="Arial, sans-serif" font-size="15" fill="#52616f">删除和更新后，空闲页仍留在数据库文件内部；VACUUM 会重建文件并重新紧凑排列有效数据。</text>

  <g transform="translate(42 124)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1c2a39">整理前</text>
    <rect x="0" y="24" width="374" height="110" rx="8" fill="#ffffff" stroke="#d7dee8"/>
    <g transform="translate(18 44)">
      <rect x="0" y="0" width="34" height="72" rx="4" fill="#57b894"/>
      <rect x="42" y="0" width="34" height="72" rx="4" fill="#e9edf3"/>
      <rect x="84" y="0" width="34" height="72" rx="4" fill="#5b8def"/>
      <rect x="126" y="0" width="34" height="72" rx="4" fill="#e9edf3"/>
      <rect x="168" y="0" width="34" height="72" rx="4" fill="#57b894"/>
      <rect x="210" y="0" width="34" height="72" rx="4" fill="#f0b35a"/>
      <rect x="252" y="0" width="34" height="72" rx="4" fill="#e9edf3"/>
      <rect x="294" y="0" width="34" height="72" rx="4" fill="#5b8def"/>
    </g>
    <text x="0" y="166" font-family="Arial, sans-serif" font-size="14" fill="#52616f">有效页和空闲页交错，文件体积不一定随删除缩小。</text>
  </g>

  <path d="M430 188h72" stroke="#7a8797" stroke-width="3" stroke-linecap="round"/>
  <path d="M502 188l-14-9v18z" fill="#7a8797"/>
  <text x="428" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">VACUUM</text>

  <g transform="translate(546 124)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1c2a39">整理后</text>
    <rect x="0" y="24" width="332" height="110" rx="8" fill="#ffffff" stroke="#d7dee8"/>
    <g transform="translate(18 44)">
      <rect x="0" y="0" width="34" height="72" rx="4" fill="#57b894"/>
      <rect x="42" y="0" width="34" height="72" rx="4" fill="#57b894"/>
      <rect x="84" y="0" width="34" height="72" rx="4" fill="#5b8def"/>
      <rect x="126" y="0" width="34" height="72" rx="4" fill="#5b8def"/>
      <rect x="168" y="0" width="34" height="72" rx="4" fill="#f0b35a"/>
      <rect x="210" y="0" width="34" height="72" rx="4" fill="#e9edf3"/>
      <rect x="252" y="0" width="34" height="72" rx="4" fill="#e9edf3"/>
    </g>
    <text x="0" y="166" font-family="Arial, sans-serif" font-size="14" fill="#52616f">有效数据被重新排列，文件尾部空闲空间可被截断。</text>
  </g>

  <g transform="translate(42 330)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#57b894"/>
    <text x="26" y="14" font-family="Arial, sans-serif" font-size="14" fill="#445466">表数据页</text>
    <rect x="122" y="0" width="18" height="18" rx="3" fill="#5b8def"/>
    <text x="148" y="14" font-family="Arial, sans-serif" font-size="14" fill="#445466">索引页</text>
    <rect x="224" y="0" width="18" height="18" rx="3" fill="#f0b35a"/>
    <text x="250" y="14" font-family="Arial, sans-serif" font-size="14" fill="#445466">元信息页</text>
    <rect x="346" y="0" width="18" height="18" rx="3" fill="#e9edf3" stroke="#cfd8e3"/>
    <text x="372" y="14" font-family="Arial, sans-serif" font-size="14" fill="#445466">空闲页</text>
  </g>
</svg>
