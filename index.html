<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="叹雪的小本本">
    <title>叹雪的小本本</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
            <div class="sidebar-header">
                <div class="avatar">
                    <img src="static/logo.jpg" alt="头像" id="sidebar-avatar">
                </div>
                <h2 class="sidebar-name" id="sidebar-name">叹雪</h2>
                <p class="sidebar-bio" id="sidebar-bio">记录玩机经历以及经验</p>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link active">
                    <i class="ri-home-4-line"></i>
                    <span>首页</span>
                </a>
                <a href="https://github.com/tanxue0118" target="_blank" class="sidebar-link">
                    <i class="ri-github-line"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://tanxue.qzz.io/" target="_blank" class="sidebar-link">
                    <i class="ri-links-line"></i>
                    <span>个人主页</span>
                </a>
            </nav>

            <div class="sidebar-tags">
                <h3 class="sidebar-section-title">标签</h3>
                <div class="tag-list" id="tag-list">
                    <!-- 标签由 JavaScript 动态生成 -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle">
                    <i class="ri-moon-line"></i>
                    <span>深色模式</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <!-- 主内容 -->
    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" id="menu-btn">
                    <i class="ri-menu-line"></i>
                </button>
                <button class="sidebar-toggle" id="sidebar-toggle" title="收起侧边栏">
                    <i class="ri-side-bar-line"></i>
                </button>
            </div>
            <h1 class="topbar-title">首页</h1>
            <button class="theme-btn" id="theme-btn">
                <i class="ri-moon-line"></i>
            </button>
        </header>

        <main class="main">
            <div class="container">
                <div class="posts" id="posts-list">
                    <!-- 文章列表由 JavaScript 动态生成 -->
                </div>

                <div class="pagination">
                    <a href="javascript:;" class="page-btn disabled">← 上一页</a>
                    <span class="page-info" id="page-info">第 1/1 页</span>
                    <a href="javascript:;" class="page-btn disabled">下一页 →</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>叹雪的小本本</p>
        </footer>
    </div>

    <script src="static/script.js"></script>
</body>

</html>
