<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">SQLite VACUUM rebuild flow</title>
  <desc id="desc">A four-step diagram showing how VACUUM copies valid data into a temporary database and replaces the original file.</desc>
  <rect width="920" height="460" fill="#fbfcfe"/>
  <text x="42" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">VACUUM 的文件重建流程</text>
  <text x="42" y="86" font-family="Arial, sans-serif" font-size="15" fill="#52616f">它不是就地删除空洞，而是把有效数据复制到新的紧凑数据库文件，再完成替换。</text>

  <g transform="translate(50 134)">
    <rect x="0" y="0" width="170" height="190" rx="10" fill="#ffffff" stroke="#d7dee8"/>
    <text x="22" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1c2a39">1. 旧数据库</text>
    <rect x="28" y="62" width="26" height="70" rx="3" fill="#57b894"/>
    <rect x="60" y="62" width="26" height="70" rx="3" fill="#e9edf3"/>
    <rect x="92" y="62" width="26" height="70" rx="3" fill="#5b8def"/>
    <rect x="124" y="62" width="26" height="70" rx="3" fill="#e9edf3"/>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="13" fill="#52616f">包含有效页和空闲页</text>
  </g>

  <path d="M242 226h64" stroke="#7a8797" stroke-width="3" stroke-linecap="round"/>
  <path d="M306 226l-14-9v18z" fill="#7a8797"/>

  <g transform="translate(328 134)">
    <rect x="0" y="0" width="170" height="190" rx="10" fill="#ffffff" stroke="#d7dee8"/>
    <text x="22" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1c2a39">2. 临时库</text>
    <rect x="28" y="62" width="26" height="70" rx="3" fill="#57b894"/>
    <rect x="60" y="62" width="26" height="70" rx="3" fill="#57b894"/>
    <rect x="92" y="62" width="26" height="70" rx="3" fill="#5b8def"/>
    <rect x="124" y="62" width="26" height="70" rx="3" fill="#f0b35a"/>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="13" fill="#52616f">只写入有效内容</text>
  </g>

  <path d="M520 226h64" stroke="#7a8797" stroke-width="3" stroke-linecap="round"/>
  <path d="M584 226l-14-9v18z" fill="#7a8797"/>

  <g transform="translate(606 134)">
    <rect x="0" y="0" width="170" height="190" rx="10" fill="#ffffff" stroke="#d7dee8"/>
    <text x="22" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1c2a39">3. 替换文件</text>
    <path d="M44 82h82M44 112h82" stroke="#5b8def" stroke-width="10" stroke-linecap="round"/>
    <path d="M114 70l30 27-30 27" fill="none" stroke="#57b894" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="13" fill="#52616f">用紧凑文件替换旧文件</text>
  </g>

  <g transform="translate(200 370)">
    <rect x="0" y="0" width="520" height="46" rx="23" fill="#eaf3ff" stroke="#c9ddf8"/>
    <text x="28" y="30" font-family="Arial, sans-serif" font-size="15" fill="#24466e">结果：空闲页减少，文件体积下降，表和索引布局更连续。</text>
  </g>
</svg>
